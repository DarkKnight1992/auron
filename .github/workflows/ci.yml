name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build, Lint, Typecheck, Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/common-actions/install

      - name: Build
        run: pnpm exec turbo build

      - name: Lint
        run: pnpm exec turbo lint

      - name: Typecheck
        run: pnpm exec turbo typecheck

      - name: Test
        run: pnpm exec turbo test

      - name: Tree-shaking check
        run: |
          pnpm --filter tree-shaking-test build
          node apps/tree-shaking-test/check-bundle.mjs

  ssr-smoke:
    name: SSR Smoke Test
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/common-actions/install

      - name: Build @auron/vue
        run: pnpm --filter @auron/vue build

      - name: Build SSR app
        run: pnpm --filter ssr-test build

      - name: Run SSR smoke test
        run: pnpm --filter ssr-test test:ssr
